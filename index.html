<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmanZaid | Cinematic Portfolio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        /* --- CSS: النمط السينمائي والتنسيق --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505; /* أسود عميق */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 900;
            /* تأثير الوهج السينمائي */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4),
                         0 0 40px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0; /* سيتحكم GSAP في إظهاره */
            margin-top: 15px;
            color: #aaa;
        }

        .nav-ui {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* تأثير الزجاج */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            z-index: 20;
            pointer-events: all;
            opacity: 0;
        }

        .nav-ui a {
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-ui a:hover {
            transform: scale(1.2);
            text-shadow: 0 0 15px #fff;
        }

        /* تأثير حبيبات الفيلم القديم */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div id="container">
        <canvas id="particleCanvas"></canvas>
        
        <div class="content">
            <h1 id="typed-title"></h1>
            <div class="subtitle">Creative Developer & Visual Artist</div>
        </div>

        <div class="nav-ui">
            <a href="#">INSTAGRAM</a>
            <a href="#">TELEGRAM</a>
            <a href="#">GITHUB</a>
        </div>
    </div>

    <script>
        /* --- JS: الجسيمات التفاعلية وتأثير الكتابة --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 200; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();
            }
            requestAnimationFrame(animate);
        }

        // تأثير الكتابة (Typed Text) لاسمك
        const titleText = "AMAN ZAID";
        const titleElement = document.getElementById('typed-title');
        let charIndex = 0;

        function typeEffect() {
            if (charIndex < titleText.length) {
                titleElement.innerHTML += titleText.charAt(charIndex);
                charIndex++;
                setTimeout(typeEffect, 150);
            } else {
                // إظهار العناصر الأخرى بعد انتهاء الكتابة باستخدام GSAP
                gsap.to(".subtitle", { opacity: 0.6, y: -10, duration: 1.5 });
                gsap.to(".nav-ui", { opacity: 1, bottom: "50px", duration: 1, ease: "back.out(1.7)" });
            }
        }

        init();
        animate();
        setTimeout(typeEffect, 500); // تأخير بسيط لبدء الكتابة
    </script>
</body>
</html>
