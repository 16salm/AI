<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Judy Abbott | رسالة إلى صاحب الظل الطويل</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Playfair+Display:400,700|Dancing+Script:700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e1a;
            --seal-red: #8b0000;
            --gold-trim: #c5a059;
        }

        body {
            background: #1a1a1a;
            /* خلفية توحي بغرفة مكتب خشبية قديمة */
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* تأثير "الظل الطويل" الذي يتحرك في الخلفية */
        body::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 30%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            transform: skewX(-25deg);
            filter: blur(40px);
            animation: shadowMove 8s ease-in-out infinite;
        }

        @keyframes shadowMove {
            0%, 100% { transform: skewX(-25deg) scaleY(1); opacity: 0.3; }
            50% { transform: skewX(-30deg) scaleY(1.2); opacity: 0.5; }
        }

        .envelope {
            width: 90%;
            max-width: 400px;
            height: 550px;
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            border-radius: 5px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            padding: 40px 25px;
            border: 1px solid #d4c3a3;
            transform-style: preserve-3d;
            transition: 0.6s ease;
        }

        /* طابع بريدي قديم */
        .stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 70px;
            background: #d4c3a3;
            border: 2px dashed var(--ink);
            padding: 5px;
            filter: grayscale(0.5);
        }

        .header-content {
            text-align: left;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(44, 30, 26, 0.2);
        }

        .header-content h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--ink);
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .profile_area {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px double var(--gold-trim);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.6) contrast(1.2);
        }

        .letter-body {
            font-family: 'Playfair Display', serif;
            color: var(--ink);
            line-height: 1.8;
            text-align: center;
        }

        .satan h4 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .snuff {
            min-height: 100px;
            font-size: 1.1rem;
            font-style: italic;
        }

        .social {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social i {
            font-size: 1.4rem;
            color: var(--ink);
            opacity: 0.7;
            transition: 0.3s;
        }

        .social a:hover i {
            opacity: 1;
            transform: scale(1.2) rotate(5deg);
            color: var(--seal-red);
        }

        /* الختم الشمعي الشهير */
        .wax-seal {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: var(--seal-red);
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-trim);
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 10;
        }

        .wax-seal::after {
            content: "J";
            font-weight: bold;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(44, 30, 26, 0.5);
        }
    </style>
</head>
<body>

<div class="envelope">
    <div class="stamp">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/Seal_of_the_United_States_Post_Office_Department.png" style="width:100%; opacity:0.6">
    </div>

    <div class="header-content">
        <h2>عزيزي صاحب الظل الطويل..</h2>
    </div>

    <div class="profile_area">
        <video class="profile_video" autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
        </video>
    </div>

    <div class="letter-body">
        <div class="satan">
            <h4>SALEM</h4>
        </div>
        
        <div class="snuff">
            <span class="typed_text"></span>
        </div>

        <div class="social">
            <a href="https://t.me/kokksha"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
            <a href="https://www.instagram.com/_u_vf"><i class="fab fa-instagram"></i></a>
            <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
        </div>
    </div>

    <div class="wax-seal"></div>
    
    <p class="footer">مدرسة چيريش هوم - لندن | 1912</p>
</div>

<script>
    var options = {
        strings: [
            "أكتب إليك هذه الأسطر من عالم الكود..", 
            "تصميم الويب هو فني الذي أرسله للعالم.", 
            "الجمال يكمن في التفاصيل الصغيرة يا سيدي.",
            "<span style='color: #8b0000;'>كن مؤمناً بنفسك</span>، فالمستحيل مجرد كلمة."
        ],
        typeSpeed: 50,
        backSpeed: 30,
        backDelay: 2000,
        loop: true,
        cursorChar: '✒️',
    };
    var typed = new Typed(".typed_text", options);
</script>
</body>
</html>
