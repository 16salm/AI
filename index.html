<!DOCTYPE HTML>
<html lang="ar">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SALEM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#0a192f;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

/* inputs */
input {
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* buttons */
button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

/* like button */
#likeBtn {
  background:#FFD700;
  color:black;
  font-weight:bold;
}

#likeBtn.liked {
  background:red;
  color:white;
}

#likeBtn:hover {
  transform: scale(1.05);
}

/* message */
#msg {
  font-size:12px;
  opacity:0.7;
  height:20px;
}
</style>
</head>

<body>

<h2>SALEM</h2>

<!-- تسجيل -->
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Login</button>

<hr>

<!-- لايك -->
<button id="likeBtn" onclick="likePost(1)">❤️ Like</button>
<p>Likes: <span id="likesCount">0</span></p>
<p id="msg"></p>

<script>
const supabaseClient = supabase.createClient(
  "https://gzioimivawyqxjoxajdw.supabase.co",
  "sb_publishable_JcCYx54XAf9iw3p1PwXSUA_rUdBzDX-"
)

let currentUser = null
let liked = false

// تسجيل
async function signUp() {
  const email = emailInput()
  const password = passInput()

  await supabaseClient.auth.signUp({ email, password })
  showMsg("تم التسجيل ✅")
}

// تسجيل دخول
async function signIn() {
  const email = emailInput()
  const password = passInput()

  await supabaseClient.auth.signInWithPassword({ email, password })
  showMsg("تم تسجيل الدخول 🔥")

  await init()
}

// لايك
async function likePost(postId) {
  if (!currentUser) {
    showMsg("سجل دخول أولاً")
    return
  }

  if (liked) {
    await supabaseClient
      .from("likes")
      .delete()
      .eq("user_id", currentUser.id)
      .eq("post_id", postId)

    liked = false
    showMsg("💔 تم إزالة اللايك")
  } else {
    await supabaseClient.from("likes").insert({
      user_id: currentUser.id,
      post_id: postId
    })

    liked = true
    showMsg("❤️ تم إضافة لايك")
  }

  updateButton()
}

// تحديث الزر
function updateButton() {
  const btn = document.getElementById("likeBtn")

  if (liked) {
    btn.classList.add("liked")
    btn.innerText = "💔 Unlike"
  } else {
    btn.classList.remove("liked")
    btn.innerText = "❤️ Like"
  }
}

// عدد اللايكات
async function getLikes(postId) {
  const { data } = await supabaseClient
    .from("likes")
    .select("*")
    .eq("post_id", postId)

  document.getElementById("likesCount").innerText = data.length
}

// تحقق إذا مسوي لايك
async function checkIfLiked(postId) {
  if (!currentUser) return

  const { data } = await supabaseClient
    .from("likes")
    .select("*")
    .eq("user_id", currentUser.id)
    .eq("post_id", postId)

  liked = data.length > 0
  updateButton()
}

// realtime
function subscribeToLikes(postId) {
  supabaseClient
    .channel('likes-channel')
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'likes',
        filter: `post_id=eq.${postId}`
      },
      () => {
        getLikes(postId)
      }
    )
    .subscribe()
}

// إشعارات
function showMsg(text) {
  const msg = document.getElementById("msg")
  msg.innerText = text

  setTimeout(() => {
    msg.innerText = ""
  }, 2000)
}

// helpers
function emailInput(){
  return document.getElementById("email").value
}
function passInput(){
  return document.getElementById("password").value
}

// init
async function init() {
  const { data } = await supabaseClient.auth.getUser()
  currentUser = data.user

  await checkIfLiked(1)
  getLikes(1)
  subscribeToLikes(1)
}

init()
</script>

</body>
</html>
