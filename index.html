<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#FFD700"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            /* خلفية عميقة جداً تبرز تأثير الزجاج */
            --back_color: radial-gradient(circle at center, #0a192f 0%, #010409 100%);
            /* شفافية زجاجية منخفضة لتعزيز تأثير التمويه */
            --glass_bg: rgba(255, 255, 255, 0.03);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
            --text-muted: #8892b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--back_color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تصميم البطاقة الزجاجية */
        .vcard {
            width: 92%;
            max-width: 400px;
            height: 580px;
            background: var(--glass_bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 30px;
            /* حدود زجاجية رفيعة تعطي إيحاءً بالانعكاس */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 
                        inset 0 0 15px rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .header {
            height: 35%;
            position: relative;
        }

        .wave_bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        /* تطبيق "لمسة التنفس" للأمواج بشفافيات متفاوتة */
        .wave-01, .wave-02, .wave-03 {
            position: absolute;
            width: 600px;
            height: 600px;
        }

        .wave-01 { 
            border-radius: 43%; top: -180%; left: -25%; 
            background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold));
            opacity: 0.35; /* الموجة الرئيسية */
            animation: rotate 14s linear infinite; 
        }
        .wave-02 { 
            border-radius: 40%; top: -185%; left: -30%; 
            background: linear-gradient(135deg, #0f172a, #c5a059);
            opacity: 0.12; /* موجة عميقة */
            animation: rotate 20s linear reverse infinite; 
        }
        .wave-03 { 
            border-radius: 45%; top: -175%; left: -20%; 
            background: var(--gold);
            opacity: 0.07; /* وميض خفيف جداً */
            animation: rotate 17s ease-in-out infinite; 
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 100%;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(197, 160, 89, 0.4);
            background-color: #000;
            z-index: 10;
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card_content {
            padding-top: 85px;
            text-align: center;
        }

        .satan h4 {
            font-size: 2em;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--gold), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .snuff {
            min-height: 80px;
            padding: 0 40px;
            color: var(--text-muted);
            font-size: 0.9em;
            line-height: 1.6;
        }

        .social {
            margin-top: 25px;
        }

        .social div {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social i {
            padding: 14px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted-gold);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social a:hover i { 
            color: var(--gold) !important; 
            background: rgba(197, 160, 89, 0.15);
            transform: translateY(-8px) scale(1.1);
            border-color: var(--gold);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-size: 0.7em;
            color: rgba(136, 146, 176, 0.3);
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="vcard">
    <div class="header">
        <div class="wave_bg">
            <div class="wave-01"></div>
            <div class="wave-02"></div>
            <div class="wave-03"></div>
        </div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <div class="card_content">
        <div class="satan">
            <h4>SALEM</h4>
        </div>
        
        <div class="snuff">
            <h5 class="typed_text"></h5>
        </div>

        <div class="social">
            <div>
                <a href="https://t.me/kokksha" title="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="tg://settings" title="Profile"><i class="fas fa-user"></i></a>
                <a href="https://g.co/kgs/pXVXQxK" title="Football"><i class="fas fa-futbol"></i></a>
                <a href="https://uokerbala.edu.iq/" title="University"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>

    <p class="footer-text">
        © 2024-2026 SALEM AL-SHAMMARI | CREATIVE DESIGN
    </p>
</div>

<script>
    var options = {
        strings: [
            "Web Designer & Creative Developer.", 
            "Crafting digital glass experiences.", 
            "<span style='color: #FFD700; font-weight: bold;'>BELIEVE IN YOURSELF</span>, IT'S POSSIBLE."
        ],
        typeSpeed: 60,
        backSpeed: 40,
        backDelay: 2500,
        loop: true,
        cursorChar: '|',
    };
    var typed = new Typed(".typed_text", options);
</script>
</body>
</html>
