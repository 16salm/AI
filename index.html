<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Visual Gallery - No Text</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030303;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .carousel-viewport {
            position: relative;
            width: 260px; 
            height: 380px; 
            transform-style: preserve-3d;
        }

        @media (min-width: 1024px) {
            .carousel-viewport { width: 320px; height: 460px; }
        }

        @media (max-width: 480px) {
            .carousel-viewport { width: 190px; height: 280px; }
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            will-change: transform, opacity;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) grayscale(100%);
        }

        /* حاوية البروفايل فقط بدون نصوص */
        .profile-container {
            margin-top: 40px;
            z-index: 100;
        }

        .profile-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid #222;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* أزرار التحكم */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-arrow {
            background: none;
            border: 1px solid #222;
            color: #555;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-arrow:hover {
            border-color: #fff;
            color: #fff;
        }

        .dots-container {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #222;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: #fff;
            transform: scale(1.3);
        }
    </style>
</head>
<body>

<div class="carousel-container">
    <div class="carousel-viewport">
        <div class="card"><img src="https://files.catbox.moe/hc08q5.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/enhg5s.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/iyvhvc.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/x0qe5i.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/af6pu8.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/9pxgka.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/4210ko.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/uhch5y.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/akm160.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/drdutv.gif"></div>
    </div>

    <div class="profile-container">
        <div class="profile-avatar">
            <img src="https://files.catbox.moe/j2l8oe.gif" alt="Icon">
        </div>
    </div>

    <div class="controls-wrapper">
        <button class="nav-arrow left">←</button>
        <div class="dots-container" id="dots"></div>
        <button class="nav-arrow right">→</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cards = document.querySelectorAll(".card");
        const dotsContainer = document.getElementById("dots");
        let currentIndex = 0;
        let isAnimating = false;

        // إنشاء النقاط تلقائياً
        cards.forEach((_, i) => {
            const dot = document.createElement("span");
            dot.classList.add("dot");
            dot.onclick = () => updateCarousel(i);
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll(".dot");

        function updateCarousel(newIndex) {
            if (isAnimating) return;
            isAnimating = true;

            currentIndex = (newIndex + cards.length) % cards.length;

            // حساب المسافة المتجاوبة
            const w = window.innerWidth;
            const xGap = w > 1024 ? 320 : (w > 768 ? 220 : 130);

            cards.forEach((card, i) => {
                let offset = i - currentIndex;
                if (offset > Math.floor(cards.length / 2)) offset -= cards.length;
                if (offset < -Math.floor(cards.length / 2)) offset += cards.length;

                let x = offset * xGap;
                let z = -Math.abs(offset) * 180;
                let opacity = Math.abs(offset) > 2 ? 0 : 1 - (Math.abs(offset) * 0.45);
                let scale = offset === 0 ? 1.15 : 0.85;
                
                gsap.to(card, {
                    x: x,
                    z: z,
                    scale: scale,
                    opacity: opacity,
                    duration: 0.9,
                    ease: "power3.out",
                    zIndex: 10 - Math.abs(offset)
                });

                gsap.to(card.querySelector("img"), {
                    filter: offset === 0 ? "brightness(1.1) grayscale(0%)" : "brightness(0.3) grayscale(100%)",
                    duration: 0.9
                });
            });

            dots.forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));
            setTimeout(() => isAnimating = false, 850);
        }

        // الأزرار واللمس
        document.querySelector(".nav-arrow.left").onclick = () => updateCarousel(currentIndex - 1);
        document.querySelector(".nav-arrow.right").onclick = () => updateCarousel(currentIndex + 1);
        
        window.onresize = () => updateCarousel(currentIndex);

        let startX = 0;
        document.ontouchstart = (e) => startX = e.touches[0].clientX;
        document.ontouchend = (e) => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) updateCarousel(currentIndex + 1);
            else if (endX - startX > 50) updateCarousel(currentIndex - 1);
        };

        updateCarousel(0);
    });
</script>
</body>
</html>
