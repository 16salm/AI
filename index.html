<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Dark Gallery - Dynamic Background</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            min-height: 100vh;
            overflow: hidden; /* منع التمرير ليبقى النموذج ثابتاً */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* الخلفية الديناميكية */
        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(50px) brightness(0.3); /* تغبيش عالي وتقليل السطوع */
            z-index: -1;
            transition: background-image 0.8s ease-in-out;
            transform: scale(1.1); /* لتجنب حواف التغبيش البيضاء */
        }

        .carousel-container {
            position: fixed; /* جعل النموذج ثابت الموقع */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .carousel-viewport {
            position: relative;
            width: 260px; 
            height: 380px; 
            transform-style: preserve-3d;
        }

        @media (min-width: 1024px) {
            .carousel-viewport { width: 320px; height: 460px; }
        }

        @media (max-width: 480px) {
            .carousel-viewport { width: 190px; height: 280px; }
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            will-change: transform, opacity;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
            transition: filter 0.8s ease;
        }

        /* صورة الأيقونة السفلية */
        .profile-avatar {
            margin-top: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            z-index: 10;
        }

        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* التحكم */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            z-index: 10;
        }

        .nav-arrow {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .nav-arrow:hover { background: #fff; color: #000; }

        .dots-container { display: flex; gap: 8px; }
        .dot {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active { background: #fff; transform: scale(1.4); }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>

<div class="carousel-container">
    <div class="carousel-viewport">
        <div class="card"><img src="https://files.catbox.moe/hc08q5.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/enhg5s.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/iyvhvc.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/x0qe5i.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/af6pu8.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/9pxgka.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/4210ko.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/uhch5y.jpeg"></div>
        <div class="card"><img src="https://files.catbox.moe/akm160.gif"></div>
        <div class="card"><img src="https://files.catbox.moe/drdutv.gif"></div>
    </div>

    <div class="profile-avatar">
        <img src="https://files.catbox.moe/j2l8oe.gif">
    </div>

    <div class="controls-wrapper">
        <button class="nav-arrow left">←</button>
        <div class="dots-container" id="dots"></div>
        <button class="nav-arrow right">→</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const cards = document.querySelectorAll(".card");
        const dotsContainer = document.getElementById("dots");
        const dynamicBg = document.getElementById("dynamic-bg");
        let currentIndex = 0;
        let isAnimating = false;

        cards.forEach((_, i) => {
            const dot = document.createElement("span");
            dot.classList.add("dot");
            dot.onclick = () => updateCarousel(i);
            dotsContainer.appendChild(dot);
        });

        const dots = document.querySelectorAll(".dot");

        function updateCarousel(newIndex) {
            if (isAnimating) return;
            isAnimating = true;

            currentIndex = (newIndex + cards.length) % cards.length;

            const w = window.innerWidth;
            const xGap = w > 1024 ? 320 : (w > 768 ? 220 : 130);

            // تحديث الخلفية لتطابق الصورة الحالية
            const currentImgSrc = cards[currentIndex].querySelector("img").src;
            dynamicBg.style.backgroundImage = `url('${currentImgSrc}')`;

            cards.forEach((card, i) => {
                let offset = i - currentIndex;
                if (offset > Math.floor(cards.length / 2)) offset -= cards.length;
                if (offset < -Math.floor(cards.length / 2)) offset += cards.length;

                let x = offset * xGap;
                let z = -Math.abs(offset) * 200;
                let opacity = Math.abs(offset) > 2 ? 0 : 1 - (Math.abs(offset) * 0.45);
                let scale = offset === 0 ? 1.15 : 0.8;
                
                gsap.to(card, {
                    x: x,
                    z: z,
                    scale: scale,
                    opacity: opacity,
                    duration: 0.9,
                    ease: "power3.out",
                    zIndex: 10 - Math.abs(offset)
                });

                gsap.to(card.querySelector("img"), {
                    filter: offset === 0 ? "brightness(1) grayscale(0%)" : "brightness(0.3) grayscale(100%)",
                    duration: 0.9
                });
            });

            dots.forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));
            setTimeout(() => isAnimating = false, 850);
        }

        document.querySelector(".nav-arrow.left").onclick = () => updateCarousel(currentIndex - 1);
        document.querySelector(".nav-arrow.right").onclick = () => updateCarousel(currentIndex + 1);
        
        window.onresize = () => updateCarousel(currentIndex);

        // التحكم باللمس
        let startX = 0;
        document.ontouchstart = (e) => startX = e.touches[0].clientX;
        document.ontouchend = (e) => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) updateCarousel(currentIndex + 1);
            else if (endX - startX > 50) updateCarousel(currentIndex - 1);
        };

        updateCarousel(0);
    });
</script>
</body>
</html>
