<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Motion Gallery - Profile Update</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #030303; /* أسود عميق جداً */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 800px; /* زيادة الارتفاع ليتناسب مع البروفايل */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1500px; /* عمق ثلاثي الأبعاد */
        }

        .carousel-viewport {
            position: relative;
            width: 300px;
            height: 400px;
            transform-style: preserve-3d;
            margin-bottom: 20px; /* مسافة قبل معلومات العضو */
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            will-change: transform, opacity;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) grayscale(100%);
            transition: filter 0.6s ease;
        }

        /* --- تنسيقات معلومات العضو والبروفايل الجديدة --- */
        .member-info-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            margin-top: 40px;
            opacity: 0; /* سنحركها بالـ JS */
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #333;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .member-role {
            color: #888;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- التحكم --- */
        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-top: 40px;
        }

        .nav-arrow {
            background: none;
            border: 1px solid #222;
            color: #666;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-arrow:hover {
            border-color: #fff;
            color: #fff;
        }

        .dots-container {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #222;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .dot.active {
            background: #fff;
            transform: scale(1.4);
        }

        @media (max-width: 768px) {
            .carousel-viewport { width: 220px; height: 320px; }
            .member-name { font-size: 1.5rem; }
            .profile-avatar { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="carousel-container">
    <div class="carousel-viewport" id="carousel">
        <div class="card"><img src="https://files.catbox.moe/hc08q5.jpeg" alt="Image 1"></div>
        <div class="card"><img src="https://files.catbox.moe/enhg5s.jpeg" alt="Image 2"></div>
        <div class="card"><img src="https://files.catbox.moe/iyvhvc.jpeg" alt="Image 3"></div>
        <div class="card"><img src="https://files.catbox.moe/x0qe5i.gif" alt="Image 4"></div>
        <div class="card"><img src="https://files.catbox.moe/af6pu8.gif" alt="Image 5"></div>
        <div class="card"><img src="https://files.catbox.moe/9pxgka.gif" alt="Image 6"></div>
        <div class="card"><img src="https://files.catbox.moe/4210ko.jpeg" alt="Image 7"></div>
        <div class="card"><img src="https://files.catbox.moe/uhch5y.jpeg" alt="Image 8"></div>
        <div class="card"><img src="https://files.catbox.moe/akm160.gif" alt="Image 9"></div>
        <div class="card"><img src="https://files.catbox.moe/drdutv.gif" alt="Image 10"></div>
    </div>

    <div class="member-info-wrapper" id="memberInfo">
        <div class="profile-avatar">
            <img src="https://files.catbox.moe/j2l8oe.gif" alt="Profile Avatar" id="profileImg">
        </div>
        <div class="text-data">
            <h2 class="member-name" id="memberName">Emily Kim</h2>
            <p class="member-role" id="memberRole">Founder</p>
        </div>
    </div>

    <div class="controls-wrapper">
        <button class="nav-arrow left" aria-label="Previous">←</button>
        <div class="dots-container">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="dot"></span>
        </div>
        <button class="nav-arrow right" aria-label="Next">→</button>
    </div>
</div>

<script>
    /* --- JavaScript --- */
    document.addEventListener("DOMContentLoaded", () => {
        // مصفوفة المعلومات الـ 10
        const teamMembers = [
            { name: "Emily Kim", role: "Founder" },
            { name: "Michael Steward", role: "Creative Director" },
            { name: "Emma Rodriguez", role: "Lead Developer" },
            { name: "Abstract Motion", role: "VFX Unit" },
            { name: "Cyber Pulse", role: "Animation Unit" },
            { name: "Dark Fluid", role: "Concept Art" },
            { name: "Julia Gimmel", role: "UX Designer" },
            { name: "Lisa Anderson", role: "Marketing" },
            { name: "Digital Geometry", role: "Render Tech" },
            { name: "Smoke Effect", role: "FX Unit" }
        ];

        const cards = document.querySelectorAll(".card");
        const dots = document.querySelectorAll(".dot");
        const memberInfoWrapper = document.getElementById("memberInfo");
        const memberName = document.getElementById("memberName");
        const memberRole = document.getElementById("memberRole");
        const profileImg = document.getElementById("profileImg"); // صورة البروفايل
        
        let currentIndex = 0;
        let isAnimating = false;

        function updateCarousel(newIndex) {
            if (isAnimating) return;
            isAnimating = true;

            currentIndex = (newIndex + cards.length) % cards.length;

            const isMobile = window.innerWidth <= 768;
            const xGap1 = isMobile ? 120 : 220;
            const xGap2 = isMobile ? 210 : 400;

            cards.forEach((card, i) => {
                let offset = i - currentIndex;
                
                if (offset > Math.floor(cards.length / 2)) offset -= cards.length;
                if (offset < -Math.floor(cards.length / 2)) offset += cards.length;

                let x = 0, z = 0, scale = 1, opacity = 1, brightness = 0.5, grayscale = 100;
                let zIndex = 10 - Math.abs(offset); 

                if (offset === 0) {
                    scale = 1.2; 
                    z = 150;
                    brightness = 1.1;
                    grayscale = 0;
                } else if (Math.abs(offset) === 1) {
                    x = offset * xGap1;
                    z = -100;
                    scale = 0.9;
                    opacity = 0.8;
                } else if (Math.abs(offset) === 2) {
                    x = offset * xGap2;
                    z = -250;
                    scale = 0.8;
                    opacity = 0.4;
                } else {
                    x = offset > 0 ? 900 : -900;
                    z = -600;
                    opacity = 0;
                }

                gsap.set(card, { zIndex: zIndex });

                gsap.to(card, {
                    x: x,
                    z: z,
                    scale: scale,
                    opacity: opacity,
                    duration: 0.9,
                    ease: "expo.out"
                });

                gsap.to(card.querySelector('img'), {
                    filter: `brightness(${brightness}) grayscale(${grayscale}%)`,
                    duration: 0.9
                });
            });

            // تحريك حاوية المعلومات بأكملها (البروفايل والنصوص)
            gsap.to(memberInfoWrapper, {
                opacity: 0,
                y: 20, // حركة لأسفل عند الاختفاء
                scale: 0.9, // تصغير خفيف
                duration: 0.3,
                ease: "power2.in",
                onComplete: () => {
                    if(teamMembers[currentIndex]) {
                        memberName.textContent = teamMembers[currentIndex].name;
                        memberRole.textContent = teamMembers[currentIndex].role;
                        // ملاحظة: صورة البروفايل واحدة للجميع في هذا الكود
                    }
                    // إعادة الظهور بحركة لأعلى
                    gsap.to(memberInfoWrapper, { 
                        opacity: 1, 
                        y: 0, 
                        scale: 1, 
                        duration: 0.5, 
                        ease: "back.out(1.7)" // تأثير ارتداد جميل
                    });
                }
            });

            dots.forEach((dot, i) => dot.classList.toggle("active", i === currentIndex));

            setTimeout(() => { isAnimating = false; }, 850);
        }

        // المستمعات
        document.querySelector(".nav-arrow.left").addEventListener("click", () => updateCarousel(currentIndex - 1));
        document.querySelector(".nav-arrow.right").addEventListener("click", () => updateCarousel(currentIndex + 1));
        
        dots.forEach((dot, i) => dot.addEventListener("click", () => updateCarousel(i)));
        cards.forEach((card, i) => card.addEventListener("click", () => updateCarousel(i)));

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") updateCarousel(currentIndex - 1);
            if (e.key === "ArrowRight") updateCarousel(currentIndex + 1);
        });

        let touchStartX = 0;
        document.addEventListener("touchstart", (e) => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener("touchend", (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 60) updateCarousel(currentIndex + 1);
            if (touchEndX - touchStartX > 60) updateCarousel(currentIndex - 1);
        });

        updateCarousel(0); // تشغيل أولي
    });
</script>

</body>
</html>
